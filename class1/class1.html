    <!-- HTML stands for HyperText Markup Language.

1. <!DOCTYPE html>
This tells the browser that this is an HTML5 document (latest version of HTML).

2. <html> / <html lang="en">
This is the main container of the whole webpage. Everything goes inside it.
lang="en" means:
The language of the page is English
Helps:
Search engines (SEO)
Screen readers (accessibility)
Think of it as the “container” of your whole website.

3. <head> section
This part contains meta-information (data about the webpage, not visible on the page).

Inside <head>:
<meta charset="UTF-8">
Sets character encoding.

UTF-8 supports:
English letters
Urdu, Arabic, Chinese, emojis, etc.
Without it, text may appear broken.

<meta name="viewport" content="width=device-width, initial-scale=1.0">
This is for responsive design (mobile support).
width=device-width → page matches screen width
initial-scale=1.0 → normal zoom level
Without this, your site may look zoomed out on phones.

<title>Document</title>
Sets the title shown in:
Browser tab
Search results
Example:
If you change it to:
<title>My Website</title>
The tab will show MyWebsite.

<body>

This is where all visible content goes.
Anything you see on a webpage goes here:
Text
Images
Buttons
Links
Videos

Example:
<body>
<h1>Hello World</h1>
<p>This is my website.</p>

</body>

</html>

This closes the HTML document.
It tells the browser:
“End of the webpage.” -->
